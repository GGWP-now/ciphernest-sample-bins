<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Tauri Victim</title>
  <style>
    body { font: 15px/1.4 "Segoe UI", sans-serif; margin: 48px; background: #f7f7f2; color: #1d2b2a; }
    input, button, output { display: block; width: min(520px, 100%); margin-top: 12px; padding: 10px; box-sizing: border-box; }
  </style>
</head>
<body>
  <h1>Tauri WebView Victim</h1>
  <input id="input" value="matrix-safe">
  <button id="button">Hash</button>
  <output id="output"></output>
  <script>
    async function digest(value) {
      const bytes = new TextEncoder().encode(value);
      const hash = await crypto.subtle.digest("SHA-256", bytes);
      return [...new Uint8Array(hash)].map((b) => b.toString(16).padStart(2, "0")).join("").slice(0, 24);
    }
    async function update() {
      const value = document.querySelector("#input").value;
      document.querySelector("#output").value = `${value} -> ${await digest(value)}`;
    }
    document.querySelector("#button").addEventListener("click", update);
    update();
  </script>
</body>
</html>
